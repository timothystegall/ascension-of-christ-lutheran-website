name: 🚀 Manual Deploy

on:
  workflow_dispatch: # Only runs when you click the button

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: 🔍 Run Biome
        run: biome ci --reporter=github .

  build-and-deploy:
    name: 🏗️ Build & 🚀 Deploy
    runs-on: ubuntu-latest
    needs: lint
    environment:
      name: github-pages
      url: ${{ steps.deploy_step.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Run Your Build Action
        # This uses your .github/actions/build folder
        uses: ./.github/actions/build
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Run Your Deploy Action
        id: deploy_step
        # This uses your .github/actions/deploy-github-pages folder
        uses: ./.github/actions/deploy-github-pages
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
