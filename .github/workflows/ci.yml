name: 🧪 Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    name: 🔍 Lint and Annotate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # Required for annotations if using specific reporters

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: 🔍 Run Biome
        # 'biome ci' is optimized for CI: it runs check, format, and lint
        # --reporter=github automatically adds annotations to your PR
        run: biome ci --reporter=github .

  build:
    name: 🏗️ Build Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗️ Build Site
        uses: ./.github/actions/build
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
